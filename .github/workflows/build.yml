name: build

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main
      - stable/**

permissions:
  contents: read

jobs:
  tox:
    name: tox (${{ matrix.project.repository }})
    uses: vexxhost/docker-atmosphere/.github/workflows/tox.yml@2244615e3b5ef56a6e83e993ede50ea9c3716cd7 # main
    strategy:
      fail-fast: false
      matrix:
        project:
          - repository: openstack/glance
            ref: 34bf76e9180cdb3cfc3c8efbb368b706abc1b578 # master
          - repository: openstack/glance_store
            ref: 149c15978b374b837e3ce28a06d7da0f1fb6bf79 # master
    with:
      repository: ${{ matrix.project.repository }}
      ref: ${{ matrix.project.ref }}

  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
      pull-requests: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: vexxhost/docker-atmosphere/.github/actions/checkout@ee412cafe33e0d7d8b3bc7d0ca64c9f155e293c7 # main
        with:
          repository: openstack/glance
          ref: 34bf76e9180cdb3cfc3c8efbb368b706abc1b578 # master

      - uses: vexxhost/docker-atmosphere/.github/actions/checkout@ee412cafe33e0d7d8b3bc7d0ca64c9f155e293c7 # main
        with:
          repository: openstack/glance_store
          ref: 149c15978b374b837e3ce28a06d7da0f1fb6bf79 # master

      - uses: vexxhost/docker-atmosphere/.github/actions/build-image@ee412cafe33e0d7d8b3bc7d0ca64c9f155e293c7 # main
        with:
          image-name: glance
          build-contexts: |
            glance=openstack/glance
            glance_store=openstack/glance_store
          push: ${{ github.event_name != 'pull_request' }}
